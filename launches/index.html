<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="description" content="Upcoming rocket launches with live countdowns. Falcon 9, SLS, Long March, Ariane 6 and more.">
<meta name="theme-color" content="#0b0d12">
<meta property="og:title" content="Launches — MissionCtrl.no">
<meta property="og:description" content="Upcoming rocket launches with live countdowns. Falcon 9, SLS, Long March, Ariane 6 and more.">
<meta property="og:type" content="website">
<meta property="og:url" content="https://missionctrl.no/launches/">
<meta property="og:site_name" content="MissionCtrl.no">
<meta name="twitter:card" content="summary">
<meta name="twitter:title" content="Launches — MissionCtrl.no">
<meta name="twitter:description" content="Upcoming rocket launches with live countdowns. Falcon 9, SLS, Long March, Ariane 6 and more.">
<link rel="icon" type="image/svg+xml" href="/favicon.svg">
<title>Launches — MissionCtrl.no</title>
<script src="/_shared.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0b0d12;--bg2:#111318;--bg3:#181b22;--bg4:#1e2230;
  --border:rgba(255,255,255,0.06);--border2:rgba(255,255,255,0.11);
  --text:#dde1ed;--muted:#5a5f72;--muted2:#8890a4;
  --blue:#4a9eff;--green:#2ed47a;--amber:#f0a500;--red:#e84040;
  --purple:#8b5cf6;--teal:#00c9a7;--orange:#fb923c;
  --mono:'Courier New',monospace;
}
body{background:var(--bg);color:var(--text);font-family:system-ui,sans-serif;font-size:13px;min-height:100vh;}
.page{max-width:1400px;margin:0 auto;padding:24px 16px;}
.page-header{margin-bottom:28px;}
.page-title{font-size:22px;font-weight:500;margin-bottom:4px;}
.page-sub{font-size:13px;color:var(--muted2);}
.section-title{font-size:10px;font-weight:500;letter-spacing:.12em;text-transform:uppercase;color:var(--muted2);margin-bottom:12px;padding-bottom:8px;border-bottom:1px solid var(--border);}
.badge{display:inline-flex;align-items:center;padding:2px 8px;border-radius:4px;font-size:10px;font-weight:500;}
.b-blue{background:rgba(74,158,255,.1);color:var(--blue);border:1px solid rgba(74,158,255,.2);}
.b-green{background:rgba(46,212,122,.1);color:var(--green);border:1px solid rgba(46,212,122,.2);}
.b-amber{background:rgba(240,165,0,.1);color:var(--amber);border:1px solid rgba(240,165,0,.2);}
.b-red{background:rgba(232,64,64,.1);color:var(--red);border:1px solid rgba(232,64,64,.2);}
.b-purple{background:rgba(139,92,246,.1);color:var(--purple);border:1px solid rgba(139,92,246,.2);}
.b-teal{background:rgba(0,201,167,.1);color:var(--teal);border:1px solid rgba(0,201,167,.2);}
.b-orange{background:rgba(251,146,60,.1);color:var(--orange);border:1px solid rgba(251,146,60,.2);}
.next-launch{background:var(--bg2);border:1px solid var(--border2);border-radius:12px;padding:24px;margin-bottom:28px;display:grid;grid-template-columns:1fr auto;gap:24px;align-items:center;}
.nl-label{font-size:10px;font-weight:500;letter-spacing:.1em;text-transform:uppercase;color:var(--blue);margin-bottom:8px;}
.nl-name{font-size:20px;font-weight:500;margin-bottom:4px;}
.nl-detail{font-size:12px;color:var(--muted2);}
.countdown{text-align:right;}
.cd-label{font-size:10px;color:var(--muted2);margin-bottom:6px;}
.cd-value{font-size:28px;font-weight:500;font-family:var(--mono);color:var(--blue);letter-spacing:.05em;}
.cd-units{display:flex;gap:16px;margin-top:4px;justify-content:flex-end;}
.cd-unit{text-align:center;}
.cd-num{font-size:18px;font-weight:500;font-family:var(--mono);color:var(--text);}
.cd-lbl{font-size:9px;color:var(--muted2);letter-spacing:.06em;}
.launch-list{margin-bottom:32px;}
.launch-row{display:grid;grid-template-columns:120px 1fr auto auto;gap:16px;align-items:center;padding:12px 16px;background:var(--bg2);border:1px solid var(--border);border-radius:8px;margin-bottom:6px;cursor:pointer;transition:all .15s;}
.launch-row:hover{border-color:var(--border2);background:var(--bg3);}
.launch-date{font-family:var(--mono);font-size:11px;color:var(--muted2);}
.launch-name{font-size:13px;font-weight:500;margin-bottom:2px;}
.launch-vehicle{font-size:11px;color:var(--muted2);}
.launch-cd{font-family:var(--mono);font-size:12px;color:var(--blue);text-align:right;min-width:100px;}
.filter-bar{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:16px;}
.filter-btn{background:var(--bg2);border:1px solid var(--border);border-radius:6px;padding:5px 12px;font-size:11px;color:var(--muted2);cursor:pointer;transition:all .15s;}
.filter-btn:hover,.filter-btn.active{background:rgba(74,158,255,.1);color:var(--blue);border-color:rgba(74,158,255,.3);}
.modal-backdrop{display:none;position:fixed;inset:0;background:rgba(0,0,0,.7);z-index:2000;align-items:center;justify-content:center;padding:20px;}
.modal-backdrop.open{display:flex;}
.modal{background:var(--bg2);border:1px solid var(--border2);border-radius:14px;padding:24px;max-width:600px;width:100%;max-height:85vh;overflow-y:auto;}
.modal-close{float:right;background:none;border:none;color:var(--muted2);cursor:pointer;font-size:20px;line-height:1;}
.stat-grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;margin:16px 0;}
.stat{background:var(--bg4);border-radius:6px;padding:8px 10px;}
.stat-label{font-size:10px;color:var(--muted2);margin-bottom:2px;}
.stat-val{font-size:12px;font-weight:500;font-family:var(--mono);}
.divider{height:1px;background:var(--border);margin:16px 0;}
.rocket-cards{display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:10px;margin-bottom:32px;}
.rocket-card{background:var(--bg2);border:1px solid var(--border);border-radius:10px;padding:14px;}
.rocket-name{font-size:14px;font-weight:500;margin-bottom:3px;}
.rocket-agency{font-size:11px;color:var(--muted2);margin-bottom:10px;}
.rocket-stats{display:grid;grid-template-columns:1fr 1fr;gap:6px;}

@media(max-width:700px){
  .layout,.grid2,.grid3{grid-template-columns:1fr!important;}
  .mission-grid,.planet-grid,.comet-grid,.astro-grid,.sat-grid,.rocket-grid,.agency-grid{grid-template-columns:1fr!important;}
  .detail-grid,.modal-grid,.sg{grid-template-columns:1fr 1fr!important;}
  .stat-grid{grid-template-columns:1fr 1fr!important;}
  .modal{padding:16px!important;}
  .next-launch{grid-template-columns:1fr!important;}
  .countdown{text-align:left!important;}
  .cd-units{justify-content:flex-start!important;}
  .compare-table{font-size:10px!important;}
  .compare-table th,.compare-table td{padding:5px!important;}
}
</style>
</head>
<body data-page="launches">
<div class="page">
  <div class="page-header">
    <div class="page-title">Launch Schedule</div>
    <div class="page-sub">Upcoming rocket launches — live countdowns, mission details and rocket specs</div>
  </div>

  <div class="next-launch" id="next-launch-card">
    <div>
      <div class="nl-label">Next Launch</div>
      <div class="nl-name" id="nl-name">Loading...</div>
      <div class="nl-detail" id="nl-detail"></div>
    </div>
    <div class="countdown">
      <div class="cd-label">Countdown</div>
      <div class="cd-units">
        <div class="cd-unit"><div class="cd-num" id="cd-d">--</div><div class="cd-lbl">DAYS</div></div>
        <div class="cd-unit"><div class="cd-num" id="cd-h">--</div><div class="cd-lbl">HRS</div></div>
        <div class="cd-unit"><div class="cd-num" id="cd-m">--</div><div class="cd-lbl">MIN</div></div>
        <div class="cd-unit"><div class="cd-num" id="cd-s">--</div><div class="cd-lbl">SEC</div></div>
      </div>
    </div>
  </div>

  <div class="filter-bar">
    <button class="filter-btn active" onclick="filterLaunches('all',this)">All</button>
    <button class="filter-btn" onclick="filterLaunches('nasa',this)">NASA</button>
    <button class="filter-btn" onclick="filterLaunches('spacex',this)">SpaceX</button>
    <button class="filter-btn" onclick="filterLaunches('cnsa',this)">CNSA</button>
    <button class="filter-btn" onclick="filterLaunches('esa',this)">ESA</button>
    <button class="filter-btn" onclick="filterLaunches('commercial',this)">Commercial</button>
  </div>

  <div class="section-title">Upcoming Launches</div>
  <div class="launch-list" id="launch-list"><div style="color:var(--muted2);">Loading...</div></div>

  <div class="section-title">Active Rocket Fleet</div>
  <div class="rocket-cards" id="rocket-cards"></div>
</div>

<div class="modal-backdrop" id="modal" onclick="if(event.target===this)closeModal()">
  <div class="modal">
    <button class="modal-close" onclick="closeModal()">✕</button>
    <div style="font-size:18px;font-weight:500;margin-bottom:4px;" id="m-name"></div>
    <div style="font-size:12px;color:var(--muted2);margin-bottom:12px;" id="m-provider"></div>
    <div id="m-badges" style="display:flex;gap:6px;flex-wrap:wrap;margin-bottom:12px;"></div>
    <div class="stat-grid" id="m-stats"></div>
    <div class="divider"></div>
    <div style="font-size:13px;font-weight:500;margin-bottom:8px;">Mission</div>
    <div style="font-size:12px;color:var(--muted2);line-height:1.7;" id="m-desc"></div>
    <div class="divider"></div>
    <div style="font-size:13px;font-weight:500;margin-bottom:8px;">Rocket</div>
    <div style="font-size:12px;color:var(--muted2);" id="m-rocket"></div>
  </div>
</div>

<script>
const PAD = n => String(n).padStart(2,'0');

const LAUNCHES = [
  {
    name:"Chang'e-7", provider:'CNSA', vehicle:'Long March 5', tag:'cnsa',
    net:new Date('2026-08-01T00:00:00Z'), status:'Planned', statusClass:'b-amber',
    site:'Wenchang, China', payload:'Orbiter + lander + rover + hopper',
    desc:"China's lunar south pole mission. The hopper will search for water ice in permanently shadowed craters using a water molecule analyzer. Cornerstone of China's fourth lunar exploration phase and precursor to the International Lunar Research Station.",
    rocket:'Long March 5 — China\'s largest operational rocket. LEO payload: 25,000 kg. GTO payload: 14,000 kg. First flight 2016.',
  },
  {
    name:'Artemis III (LEO demo)', provider:'NASA', vehicle:'SLS Block 1', tag:'nasa',
    net:new Date('2027-06-01T00:00:00Z'), status:'Planned', statusClass:'b-purple',
    site:'Kennedy Space Center, FL', payload:'Orion + crew',
    desc:'Crewed test of commercial lunar landers in low Earth orbit. Astronauts will dock Orion with SpaceX Starship HLS and/or Blue Origin Blue Moon and test all integrated systems, including the new AxEMU spacesuits.',
    rocket:'SLS Block 1 — NASA\'s Space Launch System. LEO payload: 95,000 kg. The most powerful rocket ever flown.',
  },
  {
    name:'Artemis IV — Lunar landing', provider:'NASA', vehicle:'SLS Block 1B', tag:'nasa',
    net:new Date('2028-02-01T00:00:00Z'), status:'Planned', statusClass:'b-blue',
    site:'Kennedy Space Center, FL', payload:'Orion + crew',
    desc:'First crewed lunar landing since Apollo 17, 1972. Astronauts will descend to the lunar south pole aboard a commercial lander. Marks the beginning of sustained human presence on the Moon.',
    rocket:'SLS Block 1B — Upgraded SLS with Exploration Upper Stage (EUS). Higher lunar payload capability than Block 1.',
  },
  {
    name:"Chang'e-8", provider:'CNSA', vehicle:'Long March 5', tag:'cnsa',
    net:new Date('2028-06-01T00:00:00Z'), status:'Planned', statusClass:'b-amber',
    site:'Wenchang, China', payload:'Lander + ISRU equipment',
    desc:'Follow-up to Chang\'e-7, testing in-situ resource utilization technology. Will attempt to 3D print structures from lunar regolith and test other technologies needed for long-term habitation.',
    rocket:'Long March 5 — China\'s heavy lift workhorse.',
  },
  {
    name:'Artemis V — Second landing', provider:'NASA', vehicle:'SLS Block 1B', tag:'nasa',
    net:new Date('2028-11-01T00:00:00Z'), status:'Planned', statusClass:'b-blue',
    site:'Kennedy Space Center, FL', payload:'Orion + crew',
    desc:'Second crewed lunar landing, targeting a different south pole location to build geological diversity of samples. First mission to begin building lunar base camp infrastructure.',
    rocket:'SLS Block 1B.',
  },
  {
    name:'Blue Ghost Mission 2', provider:'Firefly Aerospace / NASA CLPS', vehicle:'Falcon 9', tag:'commercial',
    net:new Date('2026-10-01T00:00:00Z'), status:'Planned', statusClass:'b-blue',
    site:'Cape Canaveral, FL', payload:'Commercial lunar lander',
    desc:'Second Blue Ghost mission, targeting the lunar far side. Carries NASA science payloads. Follow-up to the successful March 2025 landing that was the first commercial lunar landing on the far side.',
    rocket:'Falcon 9 — SpaceX workhorse. 550 launches+. First stage reusable.',
  },
  {
    name:'VIPER Rover', provider:'NASA', vehicle:'Falcon Heavy', tag:'nasa',
    net:new Date('2027-04-01T00:00:00Z'), status:'Planned', statusClass:'b-teal',
    site:'Kennedy Space Center, FL', payload:'Ice-hunting rover',
    desc:'Volatiles Investigating Polar Exploration Rover. Will drive into permanently shadowed craters at the south pole and drill for water ice samples. Reinstated after 2024 cancellation.',
    rocket:'Falcon Heavy — SpaceX\'s heavy lift vehicle. 63,800 kg to LEO. Three first-stage cores, all potentially reusable.',
  },
];

const ROCKETS = [
  {name:'Falcon 9', agency:'SpaceX', height:'70 m', liftoff:'7,607 kN', leoPayload:'22,800 kg', status:'Active', color:'var(--blue)', flights:'550+'},
  {name:'Falcon Heavy', agency:'SpaceX', height:'70 m', liftoff:'22,819 kN', leoPayload:'63,800 kg', status:'Active', color:'var(--blue)', flights:'10+'},
  {name:'SLS Block 1', agency:'NASA', height:'98 m', liftoff:'39,144 kN', leoPayload:'95,000 kg', status:'Active', color:'var(--orange)', flights:'2'},
  {name:'Long March 5', agency:'CNSA', height:'57 m', liftoff:'10,560 kN', leoPayload:'25,000 kg', status:'Active', color:'var(--red)', flights:'8+'},
  {name:'Ariane 6', agency:'ESA', height:'62 m', liftoff:'13,350 kN', leoPayload:'21,650 kg', status:'Active', color:'var(--teal)', flights:'3+'},
  {name:'New Glenn', agency:'Blue Origin', height:'98 m', liftoff:'17,100 kN', leoPayload:'45,000 kg', status:'Active', color:'var(--blue)', flights:'2+'},
  {name:'Starship', agency:'SpaceX', height:'121 m', liftoff:'74,360 kN', leoPayload:'150,000 kg', status:'Development', color:'var(--amber)', flights:'Test flights'},
  {name:'Neutron', agency:'Rocket Lab', height:'40 m', liftoff:'6,700 kN', leoPayload:'13,000 kg', status:'Development', color:'var(--purple)', flights:'Planned 2026+'},
];

let allLaunches = [...LAUNCHES];
let displayedLaunches = [...LAUNCHES];

async function fetchLiveLaunches() {
  try {
    const r = await fetch('https://ll.thespacedevs.com/2.3.0/launches/upcoming/?limit=10&format=json');
    if(!r.ok) throw new Error();
    const d = await r.json();
    if(d.results && d.results.length) {
      allLaunches = d.results.map(l => ({
        name: l.name, provider: l.launch_service_provider?.name || '',
        vehicle: l.rocket?.configuration?.name || '',
        tag: l.launch_service_provider?.name?.toLowerCase().includes('spacex') ? 'spacex' :
             l.launch_service_provider?.name?.toLowerCase().includes('nasa') ? 'nasa' : 'commercial',
        net: new Date(l.net), status: l.status?.abbrev || 'TBD',
        statusClass: 'b-blue', site: l.pad?.location?.name || '—',
        payload: l.mission?.name || l.name,
        desc: l.mission?.description || 'No description available.',
        rocket: l.rocket?.configuration?.description || '',
      }));
      displayedLaunches = [...allLaunches];
    }
  } catch(e) {
    allLaunches = [...LAUNCHES];
    displayedLaunches = [...LAUNCHES];
  }
  renderLaunches();
  updateNextLaunch();
}

function cdStr(net) {
  const diff = net - Date.now();
  if(diff < 0) return 'Launched';
  const d = Math.floor(diff/86400000);
  const h = Math.floor((diff%86400000)/3600000);
  const m = Math.floor((diff%3600000)/60000);
  const s = Math.floor((diff%60000)/1000);
  return d > 0 ? `T-${d}d ${PAD(h)}h` : `T-${PAD(h)}:${PAD(m)}:${PAD(s)}`;
}

function updateNextLaunch() {
  const next = displayedLaunches.sort((a,b)=>a.net-b.net).find(l => l.net > new Date());
  if(!next) return;
  document.getElementById('nl-name').textContent = next.name;
  document.getElementById('nl-detail').textContent = `${next.vehicle} · ${next.site}`;
  function tick() {
    const diff = next.net - Date.now();
    if(diff < 0) { document.getElementById('cd-d').textContent='00'; return; }
    document.getElementById('cd-d').textContent = PAD(Math.floor(diff/86400000));
    document.getElementById('cd-h').textContent = PAD(Math.floor((diff%86400000)/3600000));
    document.getElementById('cd-m').textContent = PAD(Math.floor((diff%3600000)/60000));
    document.getElementById('cd-s').textContent = PAD(Math.floor((diff%60000)/1000));
  }
  setInterval(tick, 1000); tick();
}

function filterLaunches(tag, btn) {
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  displayedLaunches = tag === 'all' ? [...allLaunches] : allLaunches.filter(l => l.tag === tag);
  renderLaunches();
}

function renderLaunches() {
  const el = document.getElementById('launch-list');
  el.innerHTML = '';
  const sorted = [...displayedLaunches].sort((a,b) => a.net - b.net);
  sorted.forEach(l => {
    const row = document.createElement('div');
    row.className = 'launch-row';
    row.innerHTML = `
      <div class="launch-date">${l.net.toLocaleDateString('en-GB',{day:'numeric',month:'short',year:'numeric'})}</div>
      <div>
        <div class="launch-name">${l.name}</div>
        <div class="launch-vehicle">${l.provider} · ${l.vehicle} · ${l.site}</div>
      </div>
      <span class="badge ${l.statusClass}">${l.status}</span>
      <div class="launch-cd" id="lcd-${l.net.getTime()}">${cdStr(l.net)}</div>`;
    row.onclick = () => openLaunch(l);
    el.appendChild(row);
  });
  setInterval(() => sorted.forEach(l => {
    const el = document.getElementById('lcd-'+l.net.getTime());
    if(el) el.textContent = cdStr(l.net);
  }), 1000);
}

function openLaunch(l) {
  document.getElementById('m-name').textContent = l.name;
  document.getElementById('m-provider').textContent = l.provider;
  document.getElementById('m-badges').innerHTML = `
    <span class="badge ${l.statusClass}">${l.status}</span>
    <span class="badge b-blue">${l.vehicle}</span>
    <span class="badge b-amber">${l.site}</span>`;
  document.getElementById('m-stats').innerHTML = [
    ['Launch date', l.net.toLocaleDateString('en-GB',{day:'numeric',month:'short',year:'numeric'})],
    ['Countdown', cdStr(l.net)],
    ['Payload', l.payload || '—'],
  ].map(s=>`<div class="stat"><div class="stat-label">${s[0]}</div><div class="stat-val">${s[1]}</div></div>`).join('');
  document.getElementById('m-desc').textContent = l.desc;
  document.getElementById('m-rocket').textContent = l.rocket || '—';
  document.getElementById('modal').classList.add('open');
}
function closeModal() { document.getElementById('modal').classList.remove('open'); }

function renderRockets() {
  const el = document.getElementById('rocket-cards');
  ROCKETS.forEach(r => {
    const card = document.createElement('div');
    card.className = 'rocket-card';
    card.style.borderTop = `2px solid ${r.color}33`;
    card.innerHTML = `
      <div class="rocket-name">${r.name}</div>
      <div class="rocket-agency">${r.agency} · ${r.flights} flights</div>
      <div class="rocket-stats">
        <div class="stat"><div class="stat-label">Height</div><div class="stat-val">${r.height}</div></div>
        <div class="stat"><div class="stat-label">LEO payload</div><div class="stat-val">${r.leoPayload}</div></div>
        <div class="stat"><div class="stat-label">Thrust</div><div class="stat-val">${r.liftoff}</div></div>
        <div class="stat"><div class="stat-label">Status</div><div class="stat-val" style="color:${r.status==='Active'?'var(--green)':'var(--amber)'};">${r.status}</div></div>
      </div>`;
    el.appendChild(card);
  });
}

fetchLiveLaunches();
renderRockets();
</script>
</body>
</html>
