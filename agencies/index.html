<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="description" content="Major space agencies worldwide. Budgets, active missions, capabilities and current priorities.">
<meta name="theme-color" content="#0b0d12">
<meta property="og:title" content="Space Agencies — MissionCtrl.no">
<meta property="og:description" content="Major space agencies worldwide. Budgets, active missions, capabilities and current priorities.">
<meta property="og:type" content="website">
<meta property="og:url" content="https://missionctrl.no/agencies/">
<meta property="og:site_name" content="MissionCtrl.no">
<meta name="twitter:card" content="summary">
<meta name="twitter:title" content="Space Agencies — MissionCtrl.no">
<meta name="twitter:description" content="Major space agencies worldwide. Budgets, active missions, capabilities and current priorities.">
<link rel="icon" type="image/svg+xml" href="/favicon.svg">
<title>Space Agencies — MissionCtrl.no</title>
<script src="/_shared.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{--bg:#0b0d12;--bg2:#111318;--bg3:#181b22;--bg4:#1e2230;--border:rgba(255,255,255,0.06);--border2:rgba(255,255,255,0.11);--text:#dde1ed;--muted:#5a5f72;--muted2:#8890a4;--blue:#4a9eff;--green:#2ed47a;--amber:#f0a500;--red:#e84040;--purple:#8b5cf6;--teal:#00c9a7;--orange:#fb923c;--mono:'Courier New',monospace;}
body{background:var(--bg);color:var(--text);font-family:system-ui,sans-serif;font-size:13px;min-height:100vh;}
.page{max-width:1400px;margin:0 auto;padding:24px 16px;}
.page-title{font-size:22px;font-weight:500;margin-bottom:4px;}
.page-sub{font-size:13px;color:var(--muted2);margin-bottom:24px;}
.section-title{font-size:10px;font-weight:500;letter-spacing:.12em;text-transform:uppercase;color:var(--muted2);margin-bottom:12px;padding-bottom:8px;border-bottom:1px solid var(--border);}
.badge{display:inline-flex;align-items:center;padding:2px 8px;border-radius:4px;font-size:10px;font-weight:500;}
.b-blue{background:rgba(74,158,255,.1);color:var(--blue);border:1px solid rgba(74,158,255,.2);}
.b-green{background:rgba(46,212,122,.1);color:var(--green);border:1px solid rgba(46,212,122,.2);}
.b-amber{background:rgba(240,165,0,.1);color:var(--amber);border:1px solid rgba(240,165,0,.2);}
.b-red{background:rgba(232,64,64,.1);color:var(--red);border:1px solid rgba(232,64,64,.2);}
.b-purple{background:rgba(139,92,246,.1);color:var(--purple);border:1px solid rgba(139,92,246,.2);}
.b-teal{background:rgba(0,201,167,.1);color:var(--teal);border:1px solid rgba(0,201,167,.2);}
.agency-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(340px,1fr));gap:12px;margin-bottom:28px;}
.agency-card{background:var(--bg2);border:1px solid var(--border);border-radius:10px;padding:16px;cursor:pointer;transition:all .15s;border-top-width:2px;}
.agency-card:hover{background:var(--bg3);border-color:var(--border2);}
.agency-name{font-size:16px;font-weight:500;margin-bottom:2px;}
.agency-full{font-size:11px;color:var(--muted2);margin-bottom:10px;}
.sg{display:grid;grid-template-columns:1fr 1fr;gap:6px;margin-bottom:10px;}
.st{background:var(--bg4);border-radius:6px;padding:7px;}
.sl{font-size:10px;color:var(--muted2);margin-bottom:2px;}
.sv{font-size:12px;font-weight:500;font-family:var(--mono);}
.agency-desc{font-size:12px;color:var(--muted2);line-height:1.6;}
.modal-backdrop{display:none;position:fixed;inset:0;background:rgba(0,0,0,.7);z-index:2000;align-items:center;justify-content:center;padding:20px;}
.modal-backdrop.open{display:flex;}
.modal{background:var(--bg2);border:1px solid var(--border2);border-radius:14px;padding:24px;max-width:660px;width:100%;max-height:85vh;overflow-y:auto;}
.divider{height:1px;background:var(--border);margin:14px 0;}
.budget-bar-wrap{margin-bottom:20px;}
.budget-row{display:flex;align-items:center;gap:10px;margin-bottom:5px;}
.budget-label{font-size:11px;color:var(--muted2);min-width:80px;}
.budget-bar{height:14px;border-radius:3px;display:flex;align-items:center;padding-left:6px;font-size:10px;font-weight:500;white-space:nowrap;}

@media(max-width:700px){
  .layout,.grid2,.grid3{grid-template-columns:1fr!important;}
  .mission-grid,.planet-grid,.comet-grid,.astro-grid,.sat-grid,.rocket-grid,.agency-grid{grid-template-columns:1fr!important;}
  .detail-grid,.modal-grid,.sg{grid-template-columns:1fr 1fr!important;}
  .stat-grid{grid-template-columns:1fr 1fr!important;}
  .modal{padding:16px!important;}
  .next-launch{grid-template-columns:1fr!important;}
  .countdown{text-align:left!important;}
  .cd-units{justify-content:flex-start!important;}
  .compare-table{font-size:10px!important;}
  .compare-table th,.compare-table td{padding:5px!important;}
}
</style>
</head>
<body data-page="agencies">
<div class="page">
  <div class="page-title">Space Agencies</div>
  <div class="page-sub">Active space agencies worldwide — budgets, missions and capabilities</div>

  <div class="section-title">Annual Budget Comparison (USD)</div>
  <div class="budget-bar-wrap" id="budget-bars"></div>

  <div class="section-title">Major Space Agencies</div>
  <div class="agency-grid" id="agency-grid"></div>
</div>

<div class="modal-backdrop" id="modal" onclick="if(event.target===this)closeModal()">
  <div class="modal">
    <button onclick="closeModal()" style="float:right;background:none;border:none;color:var(--muted2);cursor:pointer;font-size:20px;">✕</button>
    <div style="font-size:20px;font-weight:500;margin-bottom:3px;" id="m-name"></div>
    <div style="font-size:12px;color:var(--muted2);margin-bottom:14px;" id="m-full"></div>
    <div id="m-badges" style="display:flex;gap:6px;flex-wrap:wrap;margin-bottom:14px;"></div>
    <div style="display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:14px;" id="m-stats"></div>
    <div class="divider"></div>
    <div style="font-size:12px;font-weight:500;margin-bottom:8px;">Overview</div>
    <div style="font-size:12px;color:var(--muted2);line-height:1.7;" id="m-desc"></div>
    <div class="divider"></div>
    <div style="font-size:12px;font-weight:500;margin-bottom:8px;">Key missions &amp; achievements</div>
    <div id="m-missions"></div>
    <div class="divider"></div>
    <div style="font-size:12px;font-weight:500;margin-bottom:8px;">Current priorities</div>
    <div id="m-priorities"></div>
  </div>
</div>

<script>
const AGENCIES=[
  {name:'NASA',full:'National Aeronautics and Space Administration',country:'USA',color:'#4a9eff',sc:'b-blue',
   founded:1958,budget:25.4,employees:17000,launches:'Hundreds',
   desc:'The world\'s most prominent space agency. Responsible for Apollo Moon landings, Space Shuttle program, International Space Station, Hubble, JWST, and the ongoing Artemis program. NASA\'s science missions have fundamentally shaped our understanding of the solar system and universe.',
   missions:['Apollo Moon landings 1969–1972','Space Shuttle 1981–2011 (135 flights)','Hubble Space Telescope (1990–present)','ISS (1998–present)','Curiosity & Perseverance Mars rovers','James Webb Space Telescope','Artemis program — returning to Moon'],
   priorities:['Artemis crewed lunar landing by 2028','Commercial crew to ISS (SpaceX, Boeing)','Mars sample return in 2030s','Commercial space station transition post-ISS','Artemis Base Camp — permanent lunar presence','Climate science and Earth observation']},
  {name:'CNSA',full:'China National Space Administration',country:'China',color:'#e84040',sc:'b-red',
   founded:1993,budget:12.0,employees:150000,launches:'30+ per year',
   desc:'China\'s rapidly growing space program has made remarkable advances. From its first crewed mission in 2003 to operating the Tiangong space station, landing on the Moon\'s far side, and returning Mars samples. China aims to land humans on the Moon by 2030 and establish a permanent lunar base.',
   missions:['First crewed Shenzhou mission (2003)','Chang\'e-4 first far-side lunar landing (2019)','Chang\'e-5 lunar sample return (2020)','Tianwen-1 Mars orbiter and Zhurong rover (2021)','Tiangong space station (2021–present)','Chang\'e-6 far-side sample return (2024)'],
   priorities:['Crewed lunar landing by 2030','International Lunar Research Station','Chang\'e-7 south pole water ice mission (2026)','Mengzhou next-generation crewed spacecraft','Mars sample return mission (2030s)','Space station expansion to 6 modules']},
  {name:'ESA',full:'European Space Agency',country:'22 member states',color:'#00c9a7',sc:'b-teal',
   founded:1975,budget:10.6,employees:2500,launches:'Ariane 6, VEGA',
   desc:'The intergovernmental organisation for Europe\'s space activities. ESA provides core contributions to the ISS, JWST, ExoMars, and dozens of Earth observation satellites. Operates from multiple centres across Europe, with mission control in Darmstadt, Germany.',
   missions:['Rosetta comet mission (2004–2016)','Mars Express orbiter (2003–present)','Herschel space observatory','Gaia stellar mapping mission','Contribution to JWST service module','BepiColombo Mercury mission (arrives 2026)','EnVision Venus mission (2031)'],
   priorities:['European autonomous launch access (Ariane 6)','ExoMars 2028 rover to Mars surface','Hera asteroid mission','PLATO exoplanet telescope (2026)','Earth observation Copernicus program','Clean Space — sustainable spaceflight']},
  {name:'Roscosmos',full:'State Space Corporation Roscosmos',country:'Russia',color:'#e84040',sc:'b-red',
   founded:1992,budget:2.5,employees:250000,launches:'Soyuz, Proton, Angara',
   desc:'Russia\'s space corporation, successor to the Soviet space program that achieved numerous firsts: first satellite, first human in space, first spacewalk. Currently maintains ISS presence via Soyuz crew launches, but faces budget constraints and international isolation following the Ukraine war.',
   missions:['Soyuz crewed missions (1967–present, 1900+ flights)','Mir space station (1986–2001)','ISS Russian segment','Luna-25 (crashed 2023)','Progress cargo to ISS','Proton rocket commercial launches'],
   priorities:['ROSS — Russian Orbital Service Station (planned)','Luna-27 south pole lander','Venera-D Venus mission (with NASA, if cooperation resumes)','Angara rocket commercialisation','Maintaining ISS support until 2028']},
  {name:'JAXA',full:'Japan Aerospace Exploration Agency',country:'Japan',color:'#8b5cf6',sc:'b-purple',
   founded:2003,budget:2.3,employees:1500,launches:'H-IIA, H3',
   desc:'Japan\'s space agency known for precision engineering and innovative missions. Hayabusa and Hayabusa2 pioneered asteroid sample return, SLIM achieved Japan\'s first lunar landing in 2024, and JAXA contributes to ISS via Kibo module and HTV cargo vehicles.',
   missions:['Hayabusa asteroid sample return (2003–2010)','Hayabusa2 Ryugu sample return (2014–2020)','Kibo ISS module','HTV cargo vehicles to ISS','SLIM lunar lander (2024 — first Japanese Moon landing)','BepiColombo Mercury (joint with ESA)'],
   priorities:['H3 rocket development and commercialisation','Lunar Gateway contribution','Mars Moons eXploration (MMX) — Phobos sample return 2024','XRISM X-ray astronomy telescope','Cooperation on Artemis program']},
  {name:'ISRO',full:'Indian Space Research Organisation',country:'India',color:'#f0a500',sc:'b-amber',
   founded:1969,budget:1.9,employees:16000,launches:'PSLV, GSLV',
   desc:'India\'s space agency has achieved remarkable success with limited budgets. Chandrayaan-3 made India the fourth country to land on the Moon — and the first to land at the south pole — in 2023. Gaganyaan will make India only the fourth country to launch humans to space.',
   missions:['Chandrayaan-1 water detection (2008)','MOM Mars Orbiter Mission (2014)','Chandrayaan-3 south pole lunar landing (2023)','Aditya-L1 solar observatory (2023)','PSLV commercial launches','AstroSat space telescope'],
   priorities:['Gaganyaan crewed spaceflight (2025–2026)','Chandrayaan-4 lunar sample return','Commercial launch services (PSLV)','Venus Mission (Shukrayaan)','Space station by 2030','Indian Astronomical Observatory']},
  {name:'UAE Space Agency',full:'Mohammed Bin Rashid Space Centre / UAE Space Agency',country:'UAE',color:'#00c9a7',sc:'b-teal',
   founded:2014,budget:0.6,employees:2000,launches:'Via commercial providers',
   desc:'A young but ambitious space agency. The Hope Mars Mission (Al-Amal) in 2021 made the UAE the fifth country to reach Mars on its first attempt. The Emirates Lunar Mission targeted a rover on the Moon. The agency aims to establish a human settlement on Mars by 2117.',
   missions:['Hope Mars Orbiter (2021 — 5th country to reach Mars)','Emirates Lunar Mission Rashid rover (2022 — failed landing)','Khalifa Sat Earth observation','Plans for Mars settlement by 2117'],
   priorities:['Deep space exploration leadership','Domestically built spacecraft development','Commercial space sector growth','Astronaut programme expansion','Mars by 2117 national vision']},
  {name:'SpaceX',full:'Space Exploration Technologies Corp',country:'USA (private)',color:'#4a9eff',sc:'b-blue',
   founded:2002,budget:null,employees:13000,launches:'90+ per year',
   desc:'Elon Musk\'s private space company has arguably done more to transform access to space than any organisation since NASA\'s Apollo era. Falcon 9 is the world\'s most flown operational rocket. Dragon is the primary ISS crew vehicle. Starship aims to make humanity multiplanetary.',
   missions:['Falcon 9 — 350+ flights, 20+ reuses per booster','Dragon — primary ISS crew and cargo','Starlink — 6,000+ satellite constellation','Commercial crew to ISS (NASA contract)','Starship — largest rocket ever built','DOGE-1 first commercial lunar payload'],
   priorities:['Starship orbital refuelling and Artemis HLS','Crewed Mars mission in late 2020s','Starlink V2 next-gen broadband','Point-to-point Earth travel (Starship)','Full Starship reusability']},
];

function renderBudgetBars(){
  const el=document.getElementById('budget-bars');
  const max=25.4;
  el.innerHTML=AGENCIES.filter(a=>a.budget).sort((a,b)=>b.budget-a.budget).map(a=>`
    <div class="budget-row">
      <span class="budget-label">${a.name}</span>
      <div class="budget-bar" style="width:${Math.max(4,(a.budget/max)*100)}%;background:${a.color}22;border:1px solid ${a.color}44;color:${a.color};">$${a.budget}B</div>
    </div>`).join('');
}

function renderAgencies(){
  const g=document.getElementById('agency-grid');
  AGENCIES.forEach(a=>{
    const card=document.createElement('div');card.className='agency-card';
    card.style.borderTopColor=a.color;
    card.innerHTML=`<div style="display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:10px;">
      <div><div class="agency-name" style="color:${a.color};">${a.name}</div><div class="agency-full">${a.full}</div></div>
      <span class="badge ${a.sc}">${a.country}</span>
    </div>
    <div class="sg">
      <div class="st"><div class="sl">Founded</div><div class="sv">${a.founded}</div></div>
      <div class="st"><div class="sl">Budget</div><div class="sv">${a.budget?'$'+a.budget+'B':'Private'}</div></div>
      <div class="st"><div class="sl">Employees</div><div class="sv">${a.employees.toLocaleString()}</div></div>
      <div class="st"><div class="sl">Launches</div><div class="sv">${a.launches}</div></div>
    </div>
    <div class="agency-desc">${a.desc.substring(0,150)}...</div>
    <div style="margin-top:10px;display:flex;justify-content:flex-end;"><span style="font-size:11px;color:${a.color};">Full profile →</span></div>`;
    card.onclick=()=>openAgency(a);
    g.appendChild(card);
  });
}

function openAgency(a){
  document.getElementById('m-name').textContent=a.name;
  document.getElementById('m-name').style.color=a.color;
  document.getElementById('m-full').textContent=a.full+' · '+a.country;
  document.getElementById('m-badges').innerHTML=`<span class="badge ${a.sc}">${a.country}</span>${a.budget?`<span class="badge b-blue">$${a.budget}B budget</span>`:''}<span class="badge b-amber">Est. ${a.founded}</span>`;
  document.getElementById('m-stats').innerHTML=[['Founded',a.founded],['Budget',a.budget?'$'+a.budget+'B':'Private'],['Employees',a.employees.toLocaleString()],['Launches/yr',a.launches],['Country',a.country],['Type',a.budget?'Government':'Private']].map(s=>`<div class="st"><div class="sl">${s[0]}</div><div class="sv">${s[1]}</div></div>`).join('');
  document.getElementById('m-desc').textContent=a.desc;
  document.getElementById('m-missions').innerHTML=a.missions.map(m=>`<div style="display:flex;gap:8px;margin-bottom:6px;font-size:12px;color:var(--muted2);"><span style="color:${a.color};flex-shrink:0;">›</span><span>${m}</span></div>`).join('');
  document.getElementById('m-priorities').innerHTML=a.priorities.map(p=>`<div style="display:flex;gap:8px;margin-bottom:6px;font-size:12px;color:var(--muted2);"><span style="color:var(--amber);flex-shrink:0;">›</span><span>${p}</span></div>`).join('');
  document.getElementById('modal').classList.add('open');
}
function closeModal(){document.getElementById('modal').classList.remove('open');}
renderBudgetBars();
renderAgencies();
</script>
</body>
</html>
