<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0b0d12;--bg2:#111318;--bg3:#181b22;--bg4:#1e2230;
  --border:rgba(255,255,255,0.06);--border2:rgba(255,255,255,0.11);
  --text:#dde1ed;--muted:#5a5f72;--muted2:#8890a4;
  --blue:#4a9eff;--green:#2ed47a;--amber:#f0a500;--red:#e84040;
  --purple:#8b5cf6;--teal:#00c9a7;--orange:#fb923c;
  --mono:'Courier New',monospace;
}
body{background:var(--bg);color:var(--text);font-family:system-ui,sans-serif;font-size:13px;min-height:100vh;}
.page{max-width:1400px;margin:0 auto;padding:24px 16px;}
.page-header{margin-bottom:28px;}
.page-title{font-size:22px;font-weight:500;margin-bottom:4px;}
.page-sub{font-size:13px;color:var(--muted2);}
.section-title{font-size:10px;font-weight:500;letter-spacing:.12em;text-transform:uppercase;color:var(--muted2);margin-bottom:12px;padding-bottom:8px;border-bottom:1px solid var(--border);}
.solar-system{display:flex;align-items:center;gap:0;overflow-x:auto;padding:24px 0;margin-bottom:32px;scrollbar-width:thin;scrollbar-color:var(--border) transparent;}
.solar-system::-webkit-scrollbar{height:4px;}
.solar-system::-webkit-scrollbar-track{background:transparent;}
.solar-system::-webkit-scrollbar-thumb{background:var(--border);border-radius:2px;}
.ss-sun{width:80px;height:80px;border-radius:50%;background:radial-gradient(circle at 35% 35%,#fff5a0,#f0a500,#e05000);flex-shrink:0;cursor:pointer;position:relative;box-shadow:0 0 30px rgba(240,165,0,0.4);transition:transform .2s;}
.ss-sun:hover{transform:scale(1.05);}
.ss-orbit-wrap{display:flex;align-items:center;gap:0;padding:0 12px;}
.ss-planet-wrap{display:flex;flex-direction:column;align-items:center;gap:8px;padding:0 16px;cursor:pointer;transition:transform .2s;}
.ss-planet-wrap:hover{transform:translateY(-4px);}
.ss-planet{border-radius:50%;position:relative;transition:box-shadow .2s;}
.ss-planet.selected{box-shadow:0 0 0 2px var(--blue);}
.ss-label{font-size:10px;color:var(--muted2);text-align:center;}
.ss-dist{font-size:9px;color:var(--muted);font-family:var(--mono);}
.planet-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(320px,1fr));gap:12px;margin-bottom:32px;}
.planet-card{background:var(--bg2);border:1px solid var(--border);border-radius:10px;padding:16px;cursor:pointer;transition:all .15s;}
.planet-card:hover{border-color:var(--border2);background:var(--bg3);}
.planet-card.selected{border-color:var(--blue);background:var(--bg3);}
.planet-header{display:flex;align-items:center;gap:12px;margin-bottom:12px;}
.planet-sphere{border-radius:50%;flex-shrink:0;}
.planet-name{font-size:15px;font-weight:500;margin-bottom:2px;}
.planet-type{font-size:11px;color:var(--muted2);}
.stat-grid{display:grid;grid-template-columns:1fr 1fr;gap:6px;margin-bottom:10px;}
.stat{background:var(--bg4);border-radius:6px;padding:7px 9px;}
.stat-label{font-size:10px;color:var(--muted2);margin-bottom:2px;}
.stat-val{font-size:12px;font-weight:500;font-family:var(--mono);}
.planet-desc{font-size:12px;color:var(--muted2);line-height:1.6;margin-bottom:10px;}
.moon-list{display:flex;flex-wrap:wrap;gap:4px;}
.moon-chip{background:var(--bg4);border-radius:4px;padding:2px 7px;font-size:10px;color:var(--muted2);}
.detail-panel{background:var(--bg2);border:1px solid var(--border2);border-radius:10px;padding:20px;margin-bottom:32px;display:none;}
.detail-panel.open{display:block;}
.detail-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin:16px 0;}
.detail-stat{background:var(--bg4);border-radius:6px;padding:10px;}
.detail-stat-label{font-size:10px;color:var(--muted2);margin-bottom:3px;}
.detail-stat-val{font-size:14px;font-weight:500;font-family:var(--mono);}
.missions-at{display:flex;flex-wrap:wrap;gap:6px;margin-top:12px;}
.badge{display:inline-flex;align-items:center;padding:2px 8px;border-radius:4px;font-size:10px;font-weight:500;}
.b-blue{background:rgba(74,158,255,.1);color:var(--blue);border:1px solid rgba(74,158,255,.2);}
.b-green{background:rgba(46,212,122,.1);color:var(--green);border:1px solid rgba(46,212,122,.2);}
.b-amber{background:rgba(240,165,0,.1);color:var(--amber);border:1px solid rgba(240,165,0,.2);}
.b-red{background:rgba(232,64,64,.1);color:var(--red);border:1px solid rgba(232,64,64,.2);}
.b-purple{background:rgba(139,92,246,.1);color:var(--purple);border:1px solid rgba(139,92,246,.2);}
.b-teal{background:rgba(0,201,167,.1);color:var(--teal);border:1px solid rgba(0,201,167,.2);}
.divider{height:1px;background:var(--border);margin:16px 0;}
.compare-table{width:100%;border-collapse:collapse;}
.compare-table th{font-size:10px;font-weight:500;color:var(--muted2);text-align:left;padding:8px;letter-spacing:.06em;border-bottom:1px solid var(--border);}
.compare-table td{font-size:12px;padding:8px;border-bottom:1px solid var(--border);font-family:var(--mono);}
.compare-table tr:last-child td{border-bottom:none;}
.compare-table td:first-child{font-family:system-ui,sans-serif;font-weight:500;color:var(--text);}

@media(max-width:700px){
  .layout,.grid2,.grid3{grid-template-columns:1fr!important;}
  .mission-grid,.planet-grid,.comet-grid,.astro-grid,.sat-grid,.rocket-grid,.agency-grid{grid-template-columns:1fr!important;}
  .detail-grid,.modal-grid,.sg{grid-template-columns:1fr 1fr!important;}
  .stat-grid{grid-template-columns:1fr 1fr!important;}
  .modal{padding:16px!important;}
  .next-launch{grid-template-columns:1fr!important;}
  .countdown{text-align:left!important;}
  .cd-units{justify-content:flex-start!important;}
  .compare-table{font-size:10px!important;}
  .compare-table th,.compare-table td{padding:5px!important;}
}
</style>
</head>
<body data-page="planets">
<div class="page">

    <div class="page-title">The Solar System</div>
    <div class="page-sub">Planets, moons, and bodies — specifications, exploration history and current missions</div>

    <div class="divider"></div>
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:24px;">
      <div>
        <div style="font-size:12px;font-weight:500;margin-bottom:8px;">Moons</div>
        <div class="moon-list" id="detail-moons"></div>
      </div>
      <div>
        <div style="font-size:12px;font-weight:500;margin-bottom:8px;">Current / Recent Missions</div>
        <div id="detail-missions"></div>
      </div>
    </div>
    <div class="divider"></div>
    <div style="font-size:12px;font-weight:500;margin-bottom:8px;">Interesting Facts</div>
    <div id="detail-facts"></div>
  </div>

  <div class="section-title">All Planets</div>
  <div class="planet-grid" id="planet-grid"></div>

  <div class="section-title">Comparison Table</div>
  <div style="overflow-x:auto;">
  <table class="compare-table" id="compare-table"></table>
  </div>
</div>

function renderSolarSystem() {
  const ss = document.getElementById('ss-viz');
  ss.innerHTML = '';

  const sun = document.createElement('div');
  sun.className = 'ss-sun';
  sun.title = 'The Sun';
  sun.onclick = () => alert('The Sun — Our star. Surface temp: 5,778K. Diameter: 1,392,700 km. Contains 99.86% of the solar system\'s mass.');
  ss.appendChild(sun);

  PLANETS.forEach(p => {
    const wrap = document.createElement('div');
    wrap.className = 'ss-planet-wrap';
    const hasSaturnRings = p.name === 'Saturn';
    wrap.innerHTML = `
      <div style="position:relative;width:${p.ssSize+16}px;height:${p.ssSize+16}px;display:flex;align-items:center;justify-content:center;">
        <div class="ss-planet" style="width:${p.ssSize}px;height:${p.ssSize}px;background:${p.color};${p.name==='Earth'?'background:radial-gradient(circle at 35% 35%,#7fd8e8,#4a9eff,#1a5fa8);':''}${p.name==='Jupiter'?'background:repeating-linear-gradient(0deg,#d4a574 0px,#f0c080 4px,#c8865a 8px,#e8b878 12px);':''}"></div>
        ${hasSaturnRings?`<div style="position:absolute;width:${p.ssSize*1.8}px;height:${p.ssSize*0.35}px;border-radius:50%;border:2px solid rgba(232,208,112,0.5);top:50%;transform:translateY(-50%);pointer-events:none;"></div>`:''}
      </div>
      <div class="ss-label">${p.name}</div>
      <div class="ss-dist">${p.dist}</div>`;
    wrap.onclick = () => selectPlanet(p);
    ss.appendChild(wrap);
  });
}

function selectPlanet(p) {
  document.querySelectorAll('.planet-card').forEach(c => c.classList.remove('selected'));
  const card = document.getElementById('card-'+p.name);
  if(card) { card.classList.add('selected'); card.scrollIntoView({behavior:'smooth',block:'nearest'}); }
  openDetail(p);
}

function openDetail(p) {
  const panel = document.getElementById('detail-panel');
  const sp = document.getElementById('detail-sphere');
  sp.style.cssText = `width:60px;height:60px;background:${p.color};`;
  document.getElementById('detail-name').textContent = p.name;
  document.getElementById('detail-type').textContent = p.type + ' · ' + p.moons + ' known moon' + (p.moons!==1?'s':'');
  document.getElementById('detail-badges').innerHTML = `
    <span class="badge b-blue">${p.type}</span>
    <span class="badge b-amber">${p.distSun} from Sun</span>
    <span class="badge b-purple">${p.moons} moons</span>`;
  document.getElementById('detail-desc').textContent = p.desc;
  document.getElementById('detail-stats').innerHTML = [
    ['Diameter', p.diameter], ['Mass', p.mass], ['Gravity', p.gravity],
    ['Day length', p.dayLength], ['Year length', p.yearLength], ['Min temp', p.tempMin],
    ['Max temp', p.tempMax], ['Orbital speed', p.orbitalSpeed],
  ].map(s=>`<div class="detail-stat"><div class="detail-stat-label">${s[0]}</div><div class="detail-stat-val">${s[1]}</div></div>`).join('');
  document.getElementById('detail-moons').innerHTML = p.moonList.length ?
    p.moonList.map(m=>`<span class="moon-chip">${m}</span>`).join('') :
    '<span style="color:var(--muted2);font-size:12px;">No moons</span>';
  document.getElementById('detail-missions').innerHTML = p.missions ?
    p.missions.map(m=>`<div style="font-size:11px;color:var(--muted2);padding:3px 0;border-bottom:1px solid var(--border);">${m}</div>`).join('') :
    '<span style="color:var(--muted2);font-size:12px;">No missions</span>';
  document.getElementById('detail-facts').innerHTML = p.facts ?
    p.facts.map(f=>`<div style="display:flex;gap:8px;margin-bottom:6px;font-size:12px;color:var(--muted2);"><span style="color:var(--amber);flex-shrink:0;">›</span><span>${f}</span></div>`).join('') : '';
  panel.classList.add('open');
  panel.scrollIntoView({behavior:'smooth',block:'start'});
}

        </div>
        <div style="text-align:right;">
          <div style="font-size:11px;color:var(--muted2);">${p.moons} moon${p.moons!==1?'s':''}</div>
          <div style="font-size:10px;color:var(--muted);font-family:var(--mono);">${p.distSun}</div>
        </div>
      </div>
      <div class="planet-desc">${p.desc.substring(0,140)}...</div>
      <div class="stat-grid">
        <div class="stat"><div class="stat-label">Diameter</div><div class="stat-val">${p.diameter}</div></div>
        <div class="stat"><div class="stat-label">Gravity</div><div class="stat-val">${p.gravity}</div></div>
        <div class="stat"><div class="stat-label">Day</div><div class="stat-val">${p.dayLength}</div></div>
        <div class="stat"><div class="stat-label">Year</div><div class="stat-val">${p.yearLength}</div></div>
      </div>
      <div style="margin-top:8px;display:flex;justify-content:flex-end;">
        <span style="font-size:11px;color:var(--blue);">Full details →</span>
      </div>`;
    card.onclick = () => selectPlanet(p);
    grid.appendChild(card);
  });
}

function renderCompareTable() {
  const table = document.getElementById('compare-table');
  const rows = [
    ['Diameter', PLANETS.map(p => p.diameter)],
    ['Mass', PLANETS.map(p => p.mass)],
    ['Gravity', PLANETS.map(p => p.gravity)],
    ['Day length', PLANETS.map(p => p.dayLength)],
    ['Year length', PLANETS.map(p => p.yearLength)],
    ['Min temp', PLANETS.map(p => p.tempMin)],
    ['Max temp', PLANETS.map(p => p.tempMax)],
    ['Moons', PLANETS.map(p => p.moons)],
    ['Distance from Sun', PLANETS.map(p => p.distSun)],
    ['Orbital speed', PLANETS.map(p => p.orbitalSpeed)],
  ];
  table.innerHTML = `<thead><tr><th>Property</th>${PLANETS.map(p=>`<th>${p.name}</th>`).join('')}</tr></thead>
    <tbody>${rows.map(r=>`<tr><td>${r[0]}</td>${r[1].map(v=>`<td>${v}</td>`).join('')}</tr>`).join('')}</tbody>`;
}

renderSolarSystem();
renderPlanetGrid();
renderCompareTable();
</script>
</body>
</html>
