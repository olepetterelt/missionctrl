<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0b0d12;--bg2:#111318;--bg3:#181b22;--bg4:#1e2230;
  --border:rgba(255,255,255,0.06);--border2:rgba(255,255,255,0.11);
  --text:#dde1ed;--muted:#5a5f72;--muted2:#8890a4;
  --blue:#4a9eff;--green:#2ed47a;--amber:#f0a500;--red:#e84040;
  --purple:#8b5cf6;--teal:#00c9a7;--orange:#fb923c;
  --mono:'Courier New',monospace;
}
body{background:var(--bg);color:var(--text);font-family:system-ui,sans-serif;font-size:13px;min-height:100vh;}
.page{max-width:1400px;margin:0 auto;padding:24px 16px;}
.page-header{margin-bottom:28px;}
.page-title{font-size:22px;font-weight:500;margin-bottom:4px;}
.page-sub{font-size:13px;color:var(--muted2);}
.section-title{font-size:10px;font-weight:500;letter-spacing:.12em;text-transform:uppercase;color:var(--muted2);margin-bottom:12px;padding-bottom:8px;border-bottom:1px solid var(--border);}
.mission-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(340px,1fr));gap:12px;margin-bottom:32px;}
.mission-card{background:var(--bg2);border:1px solid var(--border);border-radius:10px;padding:16px;cursor:pointer;transition:border-color .15s,background .15s;position:relative;overflow:hidden;}
.mission-card::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;}
.mission-card:hover{border-color:var(--border2);background:var(--bg3);}
.mission-card-header{display:flex;align-items:flex-start;gap:12px;margin-bottom:12px;}
.mission-icon{width:40px;height:40px;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:20px;flex-shrink:0;}
.mission-title{font-size:14px;font-weight:500;margin-bottom:3px;}
.mission-agency{font-size:11px;color:var(--muted2);}
.badge{display:inline-flex;align-items:center;padding:2px 8px;border-radius:4px;font-size:10px;font-weight:500;}
.b-blue{background:rgba(74,158,255,.1);color:var(--blue);border:1px solid rgba(74,158,255,.2);}
.b-green{background:rgba(46,212,122,.1);color:var(--green);border:1px solid rgba(46,212,122,.2);}
.b-amber{background:rgba(240,165,0,.1);color:var(--amber);border:1px solid rgba(240,165,0,.2);}
.b-red{background:rgba(232,64,64,.1);color:var(--red);border:1px solid rgba(232,64,64,.2);}
.b-purple{background:rgba(139,92,246,.1);color:var(--purple);border:1px solid rgba(139,92,246,.2);}
.b-teal{background:rgba(0,201,167,.1);color:var(--teal);border:1px solid rgba(0,201,167,.2);}
.b-orange{background:rgba(251,146,60,.1);color:var(--orange);border:1px solid rgba(251,146,60,.2);}
.mission-desc{font-size:12px;color:var(--muted2);line-height:1.6;margin-bottom:12px;}
.mission-stats{display:grid;grid-template-columns:1fr 1fr;gap:6px;}
.stat{background:var(--bg4);border-radius:6px;padding:7px 9px;}
.stat-label{font-size:10px;color:var(--muted2);margin-bottom:2px;}
.stat-val{font-size:12px;font-weight:500;font-family:var(--mono);}
.mission-footer{display:flex;align-items:center;justify-content:space-between;margin-top:12px;padding-top:10px;border-top:1px solid var(--border);}
.progress-wrap{margin-top:10px;}
.progress-label{display:flex;justify-content:space-between;font-size:10px;color:var(--muted2);margin-bottom:4px;}
.progress-bar{height:3px;background:var(--bg4);border-radius:2px;overflow:hidden;}
.progress-fill{height:100%;border-radius:2px;transition:width .5s;}
.timeline{margin-bottom:32px;}
.timeline-item{display:flex;gap:16px;padding:12px 0;border-bottom:1px solid var(--border);}
.timeline-item:last-child{border-bottom:none;}
.timeline-dot{width:10px;height:10px;border-radius:50%;flex-shrink:0;margin-top:3px;}
.timeline-content{flex:1;}
.timeline-date{font-size:10px;color:var(--muted2);margin-bottom:2px;font-family:var(--mono);}
.timeline-title{font-size:13px;font-weight:500;margin-bottom:3px;}
.timeline-desc{font-size:11px;color:var(--muted2);line-height:1.5;}
.filter-bar{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:20px;}
.filter-btn{background:var(--bg2);border:1px solid var(--border);border-radius:6px;padding:5px 12px;font-size:11px;color:var(--muted2);cursor:pointer;transition:all .15s;}
.filter-btn:hover,.filter-btn.active{background:rgba(74,158,255,.1);color:var(--blue);border-color:rgba(74,158,255,.3);}
.modal-backdrop{display:none;position:fixed;inset:0;background:rgba(0,0,0,.7);z-index:2000;align-items:center;justify-content:center;padding:20px;}
.modal-backdrop.open{display:flex;}
.modal{background:var(--bg2);border:1px solid var(--border2);border-radius:14px;padding:24px;max-width:680px;width:100%;max-height:85vh;overflow-y:auto;}
.modal-header{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:16px;}
.modal-title{font-size:18px;font-weight:500;}
.modal-close{background:none;border:none;color:var(--muted2);cursor:pointer;font-size:20px;line-height:1;}
.modal-close:hover{color:var(--text);}
.modal-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin:16px 0;}
.divider{height:1px;background:var(--border);margin:16px 0;}

@media(max-width:700px){
  .layout,.grid2,.grid3{grid-template-columns:1fr!important;}
  .mission-grid,.planet-grid,.comet-grid,.astro-grid,.sat-grid,.rocket-grid,.agency-grid{grid-template-columns:1fr!important;}
  .detail-grid,.modal-grid,.sg{grid-template-columns:1fr 1fr!important;}
  .stat-grid{grid-template-columns:1fr 1fr!important;}
  .modal{padding:16px!important;}
  .next-launch{grid-template-columns:1fr!important;}
  .countdown{text-align:left!important;}
  .cd-units{justify-content:flex-start!important;}
  .compare-table{font-size:10px!important;}
  .compare-table th,.compare-table td{padding:5px!important;}
}
</style>
</head>
<body data-page="missions">
<div class="page">

    <div class="page-title">Space Missions</div>

<div class="modal-backdrop" id="modal" onclick="if(event.target===this)closeModal()">

    <div id="m-badges" style="display:flex;gap:6px;flex-wrap:wrap;margin-bottom:12px;"></div>

    <div class="divider"></div>
    <div style="font-size:13px;font-weight:500;margin-bottom:10px;">Objectives</div>
    <div id="m-objectives"></div>
    <div class="divider"></div>
    <div style="font-size:13px;font-weight:500;margin-bottom:10px;">Timeline</div>
    <div id="m-timeline"></div>
  </div>
</div>

let currentFilter = 'all';

function filterMissions(tag) {
  currentFilter = tag;
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
  event.target.classList.add('active');
  renderMissions();
}

function renderMissions() {
  const grid = document.getElementById('mission-grid');
  const filtered = currentFilter === 'all' ? MISSIONS : MISSIONS.filter(m => m.tags.includes(currentFilter));
  grid.innerHTML = '';
  filtered.forEach(m => {
    const card = document.createElement('div');
    card.className = 'mission-card';
    card.style.setProperty('--accent', m.color);
    card.style.cssText += `border-top: 2px solid ${m.color}22;`;
    const progressBar = m.status !== 'Upcoming' ?
      `<div class="progress-wrap">
        <div class="progress-label"><span>Mission progress</span><span>${m.progress}%</span></div>
        <div class="progress-bar"><div class="progress-fill" style="width:${m.progress}%;background:${m.color};"></div></div>
      </div>` : '';
    card.innerHTML = `
      <div class="mission-card-header">
        <div class="mission-icon" style="background:${m.color}18;">${m.icon}</div>
        <div style="flex:1;min-width:0;">
          <div class="mission-title">${m.title}</div>
          <div class="mission-agency">${m.agency}</div>
        </div>
        <span class="badge ${m.statusClass}">${m.status}</span>
      </div>
      <div class="mission-desc">${m.desc.substring(0,160)}...</div>
      <div class="mission-stats">
        ${m.stats.slice(0,4).map(s=>`<div class="stat"><div class="stat-label">${s[0]}</div><div class="stat-val">${s[1]}</div></div>`).join('')}
      </div>
      ${progressBar}
      <div class="mission-footer">
        <div style="font-size:10px;color:var(--muted2);">Launch: ${m.launch}</div>
        <span style="color:${m.color};font-size:12px;">Details →</span>
      </div>`;
    card.onclick = () => openMission(m);
    grid.appendChild(card);
  });
}

function openMission(m) {
  document.getElementById('m-title').textContent = m.title;
  document.getElementById('m-agency').textContent = m.agency;
  document.getElementById('m-badges').innerHTML = `
    <span class="badge ${m.statusClass}">${m.status}</span>
    <span class="badge b-blue">${m.target}</span>
    ${m.tags.map(t=>`<span class="badge b-purple">${t}</span>`).join('')}`;
  document.getElementById('m-stats').innerHTML = m.stats.map(s =>
    `<div class="stat"><div class="stat-label">${s[0]}</div><div class="stat-val">${s[1]}</div></div>`
  ).join('');
  document.getElementById('m-desc').textContent = m.desc;
  document.getElementById('m-objectives').innerHTML = m.objectives ? m.objectives.map(o =>
    `<div style="display:flex;gap:8px;margin-bottom:6px;font-size:12px;color:var(--muted2);">
      <span style="color:${m.color};flex-shrink:0;">›</span><span>${o}</span></div>`
  ).join('') : '<div style="color:var(--muted2);font-size:12px;">No objectives listed.</div>';
  document.getElementById('m-timeline').innerHTML = m.timeline ? m.timeline.map(t =>
    `<div style="display:flex;gap:10px;padding:7px 0;border-bottom:1px solid var(--border);">
      <div style="width:6px;height:6px;border-radius:50%;background:${t.done?m.color:'var(--muted)'};flex-shrink:0;margin-top:4px;"></div>
      <div><div style="font-size:10px;color:var(--muted2);font-family:monospace;">${t.date}</div>
      <div style="font-size:12px;${t.done?'':'color:var(--muted2);'}">${t.event}</div></div></div>`
  ).join('') : '';
  document.getElementById('modal').classList.add('open');
}
function closeModal() { document.getElementById('modal').classList.remove('open'); }

function renderTimeline() {
  const tl = document.getElementById('timeline');
  tl.innerHTML = TIMELINE.map(t => `
    <div class="timeline-item">
      <div class="timeline-dot" style="background:${t.color};"></div>
      <div class="timeline-content">
        <div class="timeline-date">${t.date}</div>
        <div class="timeline-title">${t.title}</div>
        <div class="timeline-desc">${t.desc}</div>
      </div>
    </div>`).join('');
}

renderMissions();
renderTimeline();
</script>
</body>
</html>
