<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="description" content="Interactive 3D solar system with real orbital mechanics. Watch planets orbit the Sun in real time.">
<meta property="og:title" content="3D Solar System — MissionCtrl.no">
<link rel="icon" type="image/svg+xml" href="/favicon.svg">
<title>3D Solar System — MissionCtrl.no</title>
<script src="/_shared.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0b0d12;--bg2:#111318;--bg3:#181b22;--bg4:#1e2230;
  --border:rgba(255,255,255,0.06);--border2:rgba(255,255,255,0.11);
  --text:#dde1ed;--muted:#5a5f72;--muted2:#8890a4;
  --blue:#4a9eff;--green:#2ed47a;--amber:#f0a500;--red:#e84040;
  --purple:#8b5cf6;--teal:#00c9a7;--orange:#fb923c;
  --mono:'Courier New',monospace;
}
body{background:var(--bg);color:var(--text);font-family:system-ui,sans-serif;font-size:13px;overflow:hidden;}
#canvas-wrap{position:fixed;inset:0;top:48px;}
#three-canvas{width:100%;height:100%;display:block;}
.ui{position:fixed;z-index:100;pointer-events:none;}
.ui *{pointer-events:all;}

/* Top controls */
#controls{top:58px;left:12px;display:flex;flex-direction:column;gap:6px;}
.ctrl-card{background:rgba(11,13,18,0.85);border:1px solid var(--border);border-radius:8px;padding:10px 12px;backdrop-filter:blur(8px);}
.ctrl-title{font-size:9px;font-weight:500;letter-spacing:.1em;text-transform:uppercase;color:var(--muted2);margin-bottom:7px;}
.ctrl-row{display:flex;align-items:center;gap:8px;margin-bottom:5px;}
.ctrl-row:last-child{margin-bottom:0;}
.ctrl-lbl{font-size:11px;color:var(--muted2);min-width:60px;}
input[type=range]{width:100px;accent-color:var(--blue);}
.ctrl-val{font-size:11px;font-family:var(--mono);color:var(--blue);min-width:40px;}
.ctrl-btn{background:rgba(255,255,255,0.06);border:1px solid var(--border);border-radius:5px;padding:4px 10px;color:var(--muted2);cursor:pointer;font-size:11px;transition:all .15s;}
.ctrl-btn:hover,.ctrl-btn.active{background:rgba(74,158,255,.1);color:var(--blue);border-color:rgba(74,158,255,.3);}
.ctrl-btns{display:flex;gap:4px;flex-wrap:wrap;}

/* Planet info panel */
#planet-info{top:58px;right:12px;width:240px;display:none;}
#planet-info.open{display:block;}
.pi-name{font-size:16px;font-weight:500;margin-bottom:3px;}
.pi-type{font-size:11px;color:var(--muted2);margin-bottom:10px;}
.pi-stat{display:flex;justify-content:space-between;padding:5px 0;border-bottom:1px solid var(--border);font-size:11px;}
.pi-stat:last-child{border-bottom:none;}
.pi-key{color:var(--muted2);}
.pi-val{font-family:var(--mono);}
.pi-desc{font-size:11px;color:var(--muted2);line-height:1.6;margin-top:10px;padding-top:10px;border-top:1px solid var(--border);}

/* Bottom legend */
#legend{bottom:16px;left:50%;transform:translateX(-50%);display:flex;gap:12px;flex-wrap:wrap;justify-content:center;}
.leg-item{display:flex;align-items:center;gap:5px;font-size:10px;color:var(--muted2);}
.leg-dot{width:8px;height:8px;border-radius:50%;}

/* Date display */
#date-display{bottom:16px;right:12px;font-family:var(--mono);font-size:11px;color:var(--muted2);text-align:right;background:rgba(11,13,18,0.7);border-radius:6px;padding:6px 10px;}

.badge{display:inline-flex;align-items:center;padding:2px 7px;border-radius:4px;font-size:10px;font-weight:500;}
.b-blue{background:rgba(74,158,255,.1);color:var(--blue);border:1px solid rgba(74,158,255,.2);}
</style>
</head>
<body data-page="solar-system">
<div id="canvas-wrap">
  <canvas id="three-canvas"></canvas>
</div>

<!-- Controls -->
<div class="ui" id="controls">
  <div class="ctrl-card">
    <div class="ctrl-title">Time & Speed</div>
    <div class="ctrl-row">
      <span class="ctrl-lbl">Speed</span>
      <input type="range" id="speed-slider" min="0" max="5" step="0.1" value="1">
      <span class="ctrl-val" id="speed-val">1×</span>
    </div>
    <div class="ctrl-btns">
      <button class="ctrl-btn" onclick="setSpeed(0)">Pause</button>
      <button class="ctrl-btn" onclick="setSpeed(1)">Real</button>
      <button class="ctrl-btn" onclick="setSpeed(10)">10×</button>
      <button class="ctrl-btn" onclick="setSpeed(100)">100×</button>
      <button class="ctrl-btn" onclick="setSpeed(1000)">1000×</button>
    </div>
  </div>
  <div class="ctrl-card">
    <div class="ctrl-title">View</div>
    <div class="ctrl-btns">
      <button class="ctrl-btn" id="btn-orbits" onclick="toggleOrbits()">Orbits</button>
      <button class="ctrl-btn" id="btn-labels" onclick="toggleLabels()">Labels</button>
      <button class="ctrl-btn" id="btn-asteroids" onclick="toggleAsteroids()">Asteroids</button>
      <button class="ctrl-btn" onclick="resetCamera()">Reset cam</button>
    </div>
    <div class="ctrl-row" style="margin-top:6px;">
      <span class="ctrl-lbl">Planet size</span>
      <input type="range" id="size-slider" min="0.5" max="5" step="0.1" value="1">
      <span class="ctrl-val" id="size-val">1×</span>
    </div>
  </div>
  <div class="ctrl-card" style="max-width:200px;">
    <div class="ctrl-title">Jump to planet</div>
    <div class="ctrl-btns" id="planet-btns"></div>
  </div>
</div>

<!-- Planet info panel -->
<div class="ui" id="planet-info">
  <div class="ctrl-card">
    <div class="pi-name" id="pi-name">—</div>
    <div class="pi-type" id="pi-type">—</div>
    <div id="pi-stats"></div>
    <div class="pi-desc" id="pi-desc">—</div>
    <button class="ctrl-btn" style="margin-top:10px;width:100%;" onclick="closePlanetInfo()">Close</button>
  </div>
</div>

<!-- Legend -->
<div class="ui" id="legend">
  <div class="leg-item"><div class="leg-dot" style="background:#fff8a0;"></div>Sun</div>
  <div class="leg-item"><div class="leg-dot" style="background:#b0afae;"></div>Mercury</div>
  <div class="leg-item"><div class="leg-dot" style="background:#ffe4a0;"></div>Venus</div>
  <div class="leg-item"><div class="leg-dot" style="background:#4a9eff;"></div>Earth</div>
  <div class="leg-item"><div class="leg-dot" style="background:#e84040;"></div>Mars</div>
  <div class="leg-item"><div class="leg-dot" style="background:#f0c080;"></div>Jupiter</div>
  <div class="leg-item"><div class="leg-dot" style="background:#e8d070;"></div>Saturn</div>
  <div class="leg-item"><div class="leg-dot" style="background:#7fd8e8;"></div>Uranus</div>
  <div class="leg-item"><div class="leg-dot" style="background:#4070f0;"></div>Neptune</div>
  <div class="leg-item"><div class="leg-dot" style="background:rgba(255,255,255,0.3);"></div>Asteroid belt</div>
</div>

<!-- Date display -->
<div class="ui" id="date-display">
  <div id="sim-date">—</div>
  <div style="font-size:10px;margin-top:2px;opacity:.6;">Simulated date</div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script>
const PLANET_DATA = [
  {name:'Mercury', type:'Terrestrial planet', color:0xb0afae, radius:0.4, distance:8, speed:4.15, tilt:0.034,
   moons:0, dayLen:'59 Earth days', yearLen:'88 Earth days', temp:'-180 to 430°C', desc:'Smallest planet. Almost no atmosphere. Surface covered in craters. Huge iron core.'},
  {name:'Venus', type:'Terrestrial planet', color:0xffe4a0, radius:0.95, distance:14, speed:1.62, tilt:177.4,
   moons:0, dayLen:'243 Earth days', yearLen:'225 Earth days', temp:'465°C', desc:'Hottest planet. Rotates backwards. 90× Earth surface pressure. CO₂ runaway greenhouse.'},
  {name:'Earth', type:'Terrestrial planet', color:0x4a9eff, radius:1, distance:20, speed:1, tilt:23.4,
   moons:1, dayLen:'24 hours', yearLen:'365.25 days', temp:'-89 to 57°C', desc:'Our home. Only known planet with life. Liquid water oceans cover 71% of the surface.'},
  {name:'Mars', type:'Terrestrial planet', color:0xe84040, radius:0.53, distance:28, speed:0.531, tilt:25.2,
   moons:2, dayLen:'24h 37m', yearLen:'687 Earth days', temp:'-125 to 20°C', desc:'The Red Planet. Olympus Mons (22km) is the tallest volcano in the solar system.'},
  {name:'Jupiter', type:'Gas giant', color:0xf0c080, radius:3.2, distance:52, speed:0.0843, tilt:3.1,
   moons:95, dayLen:'9h 56m', yearLen:'11.9 Earth years', temp:'-145°C (cloud tops)', desc:'Largest planet. Great Red Spot storm ongoing 350+ years. 95 known moons including Europa.'},
  {name:'Saturn', type:'Gas giant', color:0xe8d070, radius:2.7, distance:75, speed:0.0339, tilt:26.7,
   moons:146, dayLen:'10h 42m', yearLen:'29.5 Earth years', temp:'-178°C', desc:'Famous ring system spans 282,000 km but is only ~10m thick. Less dense than water.', rings:true},
  {name:'Uranus', type:'Ice giant', color:0x7fd8e8, radius:1.8, distance:100, speed:0.0119, tilt:97.8,
   moons:28, dayLen:'17h 14m', yearLen:'84 Earth years', temp:'-224°C', desc:'Rotates on its side (98° tilt). Coldest planetary atmosphere. Ice giant category.'},
  {name:'Neptune', type:'Ice giant', color:0x4070f0, radius:1.75, distance:120, speed:0.00606, tilt:28.3,
   moons:16, dayLen:'16h 6m', yearLen:'165 Earth years', temp:'-218°C', desc:'Fastest winds in solar system (2,100 km/h). Predicted mathematically before being observed.'},
];

// Three.js setup
const canvas = document.getElementById('three-canvas');
const renderer = new THREE.WebGLRenderer({canvas, antialias:true, alpha:true});
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
renderer.setSize(window.innerWidth, window.innerHeight - 48);
renderer.shadowMap.enabled = true;

const scene = new THREE.Scene();
const camera = new THREE.PerspectiveCamera(60, (window.innerWidth)/(window.innerHeight-48), 0.1, 10000);
camera.position.set(0, 60, 100);
camera.lookAt(0,0,0);

// Stars background
const starGeo = new THREE.BufferGeometry();
const starCount = 8000;
const starPos = new Float32Array(starCount * 3);
for(let i=0;i<starCount*3;i++) starPos[i] = (Math.random()-0.5)*4000;
starGeo.setAttribute('position', new THREE.BufferAttribute(starPos, 3));
const starMat = new THREE.PointsMaterial({color:0xffffff, size:0.6, transparent:true, opacity:0.8});
scene.add(new THREE.Points(starGeo, starMat));

// Lighting
const ambientLight = new THREE.AmbientLight(0x111122, 0.3);
scene.add(ambientLight);
const sunLight = new THREE.PointLight(0xfffaf0, 2.5, 2000);
scene.add(sunLight);

// Sun
const sunGeo = new THREE.SphereGeometry(5, 32, 32);
const sunMat = new THREE.MeshBasicMaterial({color:0xfff5a0});
const sunMesh = new THREE.Mesh(sunGeo, sunMat);
scene.add(sunMesh);

// Sun glow
const glowGeo = new THREE.SphereGeometry(6, 32, 32);
const glowMat = new THREE.MeshBasicMaterial({color:0xf0a500, transparent:true, opacity:0.15, side:THREE.BackSide});
scene.add(new THREE.Mesh(glowGeo, glowMat));

// Asteroid belt
const asteroidGroup = new THREE.Group();
scene.add(asteroidGroup);
function buildAsteroids() {
  const geo = new THREE.BufferGeometry();
  const count = 2000;
  const pos = new Float32Array(count * 3);
  for(let i=0;i<count;i++) {
    const angle = Math.random()*Math.PI*2;
    const r = 38 + Math.random()*8;
    const y = (Math.random()-0.5)*2;
    pos[i*3] = Math.cos(angle)*r;
    pos[i*3+1] = y;
    pos[i*3+2] = Math.sin(angle)*r;
  }
  geo.setAttribute('position', new THREE.BufferAttribute(pos, 3));
  const mat = new THREE.PointsMaterial({color:0x888866, size:0.3, transparent:true, opacity:0.6});
  asteroidGroup.add(new THREE.Points(geo, mat));
}
buildAsteroids();

// Planets
let sizeMultiplier = 1;
const planetMeshes = [];
const orbitLines = [];
const labelDivs = [];

function buildPlanets() {
  // Remove old
  planetMeshes.forEach(p => scene.remove(p.pivot));
  orbitLines.forEach(l => scene.remove(l));
  labelDivs.forEach(d => d.remove());
  planetMeshes.length = 0; orbitLines.length = 0; labelDivs.length = 0;

  PLANET_DATA.forEach((pd, i) => {
    // Orbit line
    const orbitGeo = new THREE.BufferGeometry();
    const pts = [];
    for(let j=0;j<=128;j++) {
      const a = (j/128)*Math.PI*2;
      pts.push(Math.cos(a)*pd.distance, 0, Math.sin(a)*pd.distance);
    }
    orbitGeo.setAttribute('position', new THREE.BufferAttribute(new Float32Array(pts), 3));
    const orbitMat = new THREE.LineBasicMaterial({color:0xffffff, transparent:true, opacity:0.08});
    const orbitLine = new THREE.Line(orbitGeo, orbitMat);
    scene.add(orbitLine);
    orbitLines.push(orbitLine);

    // Planet
    const r = pd.radius * sizeMultiplier;
    const geo = new THREE.SphereGeometry(r, 32, 32);
    let mat;
    if(pd.name === 'Earth') {
      mat = new THREE.MeshPhongMaterial({color:pd.color, emissive:0x001122, shininess:30});
    } else if(pd.name === 'Jupiter') {
      mat = new THREE.MeshPhongMaterial({color:pd.color, emissive:0x100800, shininess:10});
    } else {
      mat = new THREE.MeshPhongMaterial({color:pd.color, shininess:20});
    }
    const mesh = new THREE.Mesh(geo, mat);
    mesh.rotation.z = pd.tilt * Math.PI/180;

    const pivot = new THREE.Object3D();
    pivot.add(mesh);
    scene.add(pivot);

    // Saturn rings
    let ringMesh = null;
    if(pd.rings) {
      const ringGeo = new THREE.RingGeometry(r*1.4, r*2.4, 64);
      const ringMat = new THREE.MeshBasicMaterial({color:0xe8d070, side:THREE.DoubleSide, transparent:true, opacity:0.5});
      ringMesh = new THREE.Mesh(ringGeo, ringMat);
      ringMesh.rotation.x = Math.PI/2.5;
      mesh.add(ringMesh);
    }

    // Label
    const label = document.createElement('div');
    label.style.cssText = `position:fixed;pointer-events:none;font-size:10px;color:rgba(255,255,255,0.5);font-family:monospace;white-space:nowrap;transform:translate(-50%,-150%);`;
    label.textContent = pd.name;
    document.body.appendChild(label);
    labelDivs.push(label);

    // Initial angle spread
    const initialAngle = (i / PLANET_DATA.length) * Math.PI * 2;
    pivot.rotation.y = initialAngle;
    mesh.position.x = pd.distance;

    planetMeshes.push({pd, pivot, mesh, ringMesh, label, angle: initialAngle});
  });
}
buildPlanets();

// Camera controls (simple orbit)
let isDragging = false, prevMouse = {x:0,y:0};
let spherical = {theta: 0.4, phi: 1.0, radius: 120};
let targetSpherical = {...spherical};
let focusTarget = new THREE.Vector3(0,0,0);
let targetFocus = new THREE.Vector3(0,0,0);

function updateCamera() {
  camera.position.x = focusTarget.x + spherical.radius * Math.sin(spherical.phi) * Math.sin(spherical.theta);
  camera.position.y = focusTarget.y + spherical.radius * Math.cos(spherical.phi);
  camera.position.z = focusTarget.z + spherical.radius * Math.sin(spherical.phi) * Math.cos(spherical.theta);
  camera.lookAt(focusTarget);
}

canvas.addEventListener('mousedown', e => {isDragging=true;prevMouse={x:e.clientX,y:e.clientY};});
window.addEventListener('mouseup', () => isDragging=false);
window.addEventListener('mousemove', e => {
  if(!isDragging) return;
  const dx=(e.clientX-prevMouse.x)*0.005, dy=(e.clientY-prevMouse.y)*0.005;
  targetSpherical.theta -= dx;
  targetSpherical.phi = Math.max(0.1, Math.min(Math.PI-0.1, targetSpherical.phi+dy));
  prevMouse={x:e.clientX,y:e.clientY};
});
canvas.addEventListener('wheel', e => {
  targetSpherical.radius = Math.max(10, Math.min(600, targetSpherical.radius + e.deltaY*0.2));
  e.preventDefault();
}, {passive:false});

// Touch support
let lastTouchDist = 0;
canvas.addEventListener('touchstart', e => {
  if(e.touches.length===1){isDragging=true;prevMouse={x:e.touches[0].clientX,y:e.touches[0].clientY};}
  if(e.touches.length===2){lastTouchDist=Math.hypot(e.touches[0].clientX-e.touches[1].clientX,e.touches[0].clientY-e.touches[1].clientY);}
});
canvas.addEventListener('touchmove', e => {
  if(e.touches.length===1&&isDragging){
    const dx=(e.touches[0].clientX-prevMouse.x)*0.005,dy=(e.touches[0].clientY-prevMouse.y)*0.005;
    targetSpherical.theta-=dx;targetSpherical.phi=Math.max(0.1,Math.min(Math.PI-0.1,targetSpherical.phi+dy));
    prevMouse={x:e.touches[0].clientX,y:e.touches[0].clientY};
  }
  if(e.touches.length===2){
    const d=Math.hypot(e.touches[0].clientX-e.touches[1].clientX,e.touches[0].clientY-e.touches[1].clientY);
    targetSpherical.radius=Math.max(10,Math.min(600,targetSpherical.radius+(lastTouchDist-d)*0.5));
    lastTouchDist=d;
  }
  e.preventDefault();
},{passive:false});
canvas.addEventListener('touchend',()=>isDragging=false);

// Click to select planet
const raycaster = new THREE.Raycaster();
const mouse = new THREE.Vector2();
canvas.addEventListener('click', e => {
  mouse.x = (e.clientX/window.innerWidth)*2-1;
  mouse.y = -((e.clientY-48)/(window.innerHeight-48))*2+1;
  raycaster.setFromCamera(mouse, camera);
  const meshes = planetMeshes.map(p=>p.mesh);
  const hits = raycaster.intersectObjects(meshes);
  if(hits.length) {
    const idx = meshes.indexOf(hits[0].object);
    if(idx>=0) openPlanetInfo(planetMeshes[idx]);
  }
});

// Planet jump buttons
const planetBtns = document.getElementById('planet-btns');
PLANET_DATA.forEach((pd,i) => {
  const btn = document.createElement('button');
  btn.className = 'ctrl-btn';
  btn.textContent = pd.name;
  btn.onclick = () => jumpToPlanet(i);
  planetBtns.appendChild(btn);
});

function jumpToPlanet(i) {
  const p = planetMeshes[i];
  const worldPos = new THREE.Vector3();
  p.mesh.getWorldPosition(worldPos);
  targetFocus.copy(worldPos);
  targetSpherical.radius = p.pd.radius * sizeMultiplier * 15 + 10;
  openPlanetInfo(p);
}
function resetCamera() {
  targetFocus.set(0,0,0);
  targetSpherical = {theta:0.4, phi:1.0, radius:120};
}

// Planet info
function openPlanetInfo(p) {
  const pd = p.pd;
  document.getElementById('pi-name').textContent = pd.name;
  document.getElementById('pi-name').style.color = '#'+pd.color.toString(16).padStart(6,'0');
  document.getElementById('pi-type').textContent = pd.type;
  document.getElementById('pi-stats').innerHTML = [
    ['Moons', pd.moons],
    ['Day length', pd.dayLen],
    ['Year length', pd.yearLen],
    ['Temperature', pd.temp],
  ].map(s=>`<div class="pi-stat"><span class="pi-key">${s[0]}</span><span class="pi-val">${s[1]}</span></div>`).join('');
  document.getElementById('pi-desc').textContent = pd.desc;
  document.getElementById('planet-info').classList.add('open');
}
function closePlanetInfo() { document.getElementById('planet-info').classList.remove('open'); }

// Speed control
let speedMultiplier = 1;
function setSpeed(v) {
  speedMultiplier = v;
  document.getElementById('speed-slider').value = Math.min(5, Math.log10(Math.max(1,v)));
  document.getElementById('speed-val').textContent = v+'×';
}
document.getElementById('speed-slider').addEventListener('input', e => {
  const v = Math.pow(10, parseFloat(e.target.value));
  speedMultiplier = v;
  document.getElementById('speed-val').textContent = v.toFixed(v>=10?0:1)+'×';
});
document.getElementById('size-slider').addEventListener('input', e => {
  sizeMultiplier = parseFloat(e.target.value);
  document.getElementById('size-val').textContent = sizeMultiplier.toFixed(1)+'×';
  buildPlanets();
});

// Toggle options
let showOrbits=true, showLabels=true, showAsteroids=true;
function toggleOrbits(){
  showOrbits=!showOrbits;
  orbitLines.forEach(l=>l.visible=showOrbits);
  document.getElementById('btn-orbits').classList.toggle('active',showOrbits);
}
function toggleLabels(){
  showLabels=!showLabels;
  labelDivs.forEach(l=>l.style.display=showLabels?'block':'none');
  document.getElementById('btn-labels').classList.toggle('active',showLabels);
}
function toggleAsteroids(){
  showAsteroids=!showAsteroids;
  asteroidGroup.visible=showAsteroids;
  document.getElementById('btn-asteroids').classList.toggle('active',showAsteroids);
}
// Init button states
document.getElementById('btn-orbits').classList.add('active');
document.getElementById('btn-labels').classList.add('active');
document.getElementById('btn-asteroids').classList.add('active');

// Date tracking
const J2000 = new Date('2000-01-01T12:00:00Z').getTime();
let simTime = Date.now();

// Animation
const clock = new THREE.Clock();
function animate() {
  requestAnimationFrame(animate);
  const dt = clock.getDelta();

  // Advance simulation time (1 real second = speedMultiplier Earth days by default)
  // 1 Earth year = 365.25 days. At speed=1, 1 real day passes per real second
  simTime += dt * speedMultiplier * 86400000;

  // Update planet positions
  const tYears = (simTime - J2000) / (365.25 * 86400000);
  planetMeshes.forEach(p => {
    // Angle = mean motion * time. speed property = revolutions per Earth year
    const angle = tYears * p.pd.speed * Math.PI * 2;
    p.pivot.rotation.y = angle;
    p.mesh.position.x = p.pd.distance;
    // Self rotation (simplified)
    p.mesh.rotation.y += dt * 0.5;
  });

  // Sun rotation
  sunMesh.rotation.y += dt * 0.02;

  // Smooth camera
  spherical.theta += (targetSpherical.theta - spherical.theta) * 0.1;
  spherical.phi += (targetSpherical.phi - spherical.phi) * 0.1;
  spherical.radius += (targetSpherical.radius - spherical.radius) * 0.1;
  focusTarget.lerp(targetFocus, 0.08);
  updateCamera();

  // Update labels
  if(showLabels) {
    planetMeshes.forEach((p, i) => {
      const worldPos = new THREE.Vector3();
      p.mesh.getWorldPosition(worldPos);
      const screenPos = worldPos.clone().project(camera);
      const x = (screenPos.x * 0.5 + 0.5) * window.innerWidth;
      const y = (-(screenPos.y) * 0.5 + 0.5) * (window.innerHeight - 48) + 48;
      if(screenPos.z < 1) {
        p.label.style.display = 'block';
        p.label.style.left = x+'px';
        p.label.style.top = y+'px';
      } else {
        p.label.style.display = 'none';
      }
    });
  }

  // Update date display
  const simDate = new Date(simTime);
  document.getElementById('sim-date').textContent = simDate.toLocaleDateString('en-GB',{day:'numeric',month:'short',year:'numeric'});

  renderer.render(scene, camera);
}
animate();

// Resize
window.addEventListener('resize', () => {
  renderer.setSize(window.innerWidth, window.innerHeight-48);
  camera.aspect = window.innerWidth / (window.innerHeight-48);
  camera.updateProjectionMatrix();
});
</script>
</body>
</html>
